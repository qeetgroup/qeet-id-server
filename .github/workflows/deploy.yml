name: Deploy

# Builds the server image, pushes it to GHCR, then deploys it onto the EC2 host
# over SSH (docker compose). The host already holds /opt/qeet-id/.env and
# jwt_signing_key.pem (created once during setup — see deploy/README.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ghcr.io/${{ github.repository }} # qeetgroup/qeet-id (lowercase)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose files to host
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: /opt/qeet-id
          strip_components: 1 # drop the leading deploy/ path

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE: ${{ env.IMAGE_BASE }}:${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,GHCR_TOKEN,ACTOR
          script: |
            set -euo pipefail
            cd /opt/qeet-id
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            export IMAGE                                  # pin to this commit's image
            export JWT_SIGNING_KEY="$(cat jwt_signing_key.pem)"
            export SAML_IDP_KEY="$(cat saml_idp_key.pem)"
            export SAML_IDP_CERT="$(cat saml_idp_cert.pem)"
            docker compose pull
            docker compose up -d --remove-orphans
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:4001/readyz >/dev/null 2>&1; then ok=1; break; fi
              sleep 2
            done
            if [ "$ok" != "1" ]; then
              echo "app did not become ready; recent logs:" >&2
              docker compose logs --tail=80 app >&2
              exit 1
            fi
            docker image prune -f >/dev/null 2>&1 || true
            echo "deployed $IMAGE"
