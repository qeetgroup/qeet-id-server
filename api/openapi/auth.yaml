        '422':
          $ref: '#/components/responses/Unprocessable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'User or service JWT: `Authorization: Bearer <token>`.'
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'API key credential. Send `Authorization: ApiKey <key>` (note the `ApiKey ` prefix). Accepted on the same authenticated routes as bearerAuth.'
    scimBearer:
      type: http
      scheme: bearer
      description: 'Per-tenant SCIM provisioning token presented by the IdP: `Authorization: Bearer <scim-token>`. Distinct from user JWTs; rotated via the SCIM admin endpoints.'
    clientCredentials:
      type: oauth2
      description: OAuth 2.0 client credentials. Clients authenticate at the token endpoint via form params (`client_id`/`client_secret`) or HTTP Basic. Revocation/introspection use the same client auth.
      flows:
        clientCredentials:
          tokenUrl: /v1/oauth/token
          scopes: {}
    ssoCookie:
      type: apiKey
      in: cookie
      name: qe_ls
      description: Hosted-login SSO session cookie (HttpOnly). Set by POST /v1/auth/session and consumed by the OAuth authorize/consent flow.
  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessable:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    RiskSettings:
      type: object
      properties:
        medium_threshold:
          type: number
        high_threshold:
          type: number
        force_mfa_at_level:
          type: string
          enum: [medium, high]
        impossible_travel_enabled:
          type: boolean
          description: Off by default. Also needs a geo signal to do anything — see GEO_COUNTRY_HEADER.
        min_travel_hours:
          type: number
          description: A login from a different country than the last one, sooner than this many hours later, is flagged.
        device_reputation_enabled:
          type: boolean
          description: Off by default. Flags a login from a browser+OS combination never seen before for this user.
    Error:
      type: object
      required:
        - error
      description: Canonical error envelope (internal/platform/httpx.WriteError).
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Stable machine code
              example: unauthorized
            message:
              type: string
              example: authentication required
            detail:
              type: string
              description: Optional human detail
            request_id:
              type: string
              description: Correlates with the X-Request-Id header
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        session_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
    Principal:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          nullable: true
        tenant_id:
          type: string
          format: uuid
          nullable: true
        session_id:
          type: string
          format: uuid
          nullable: true
        actor:
          type: string
          example: user
        scopes:
          type: array
          items:
            type: string
    Session:
      type: object
      additionalProperties: true
      description: An active session (id, ip, user agent, timestamps).
    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 256
        display_name:
          type: string
          maxLength: 200
    SignupResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        session_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        phone:
          type: string
          nullable: true
        phone_verified_at:
          type: string
          format: date-time
          nullable: true
        display_name:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - active
            - suspended
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time
    GroupRole:
      type: object
      description: A role granted to a group, with the role's name for display.
      properties:
        role_id:
          type: string
          format: uuid
        name:
          type: string
        granted_at:
          type: string
          format: date-time
    AuthzGrantStep:
      type: object
      description: >-
        One link in an authorization decision's grant path: a role that confers the requested permission and how that role reaches the user.
      properties:
        permission:
          type: string
        granted_by:
          type: string
          description: 'The conferring role, e.g. "role:admin".'
        via:
          type: string
          description: '"direct" for a user grant, or "group:<name>" for a group-derived grant.'
        group_id:
          type: string
          format: uuid
          description: Set only when via is a group grant.
        role_id:
          type: string
          format: uuid
    AuthzExplanation:
      type: object
      description: >-
        The structured "why?" for a single permission check: the decision plus every distinct grant (direct and group-derived) that confers it. Returned from GET /check when explain=true.
      properties:
        allowed:
          type: boolean
        paths:
          type: array
          items:
            $ref: '#/components/schemas/AuthzGrantStep'
        reason:
          type: string
          description: Set only on a denial.
    RoleCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 500
    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        description:
          type: string
    ABACPolicy:
      type: object
      description: One ABAC policy row.
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
        resource_type:
          type: string
          description: Resource type matched by this policy; '*' matches any.
        action:
          type: string
          description: Action matched by this policy; '*' matches any.
        condition:
          type: object
          description: >-
            Recursive JSON condition tree. An empty object {} means unconditional.
            Logical nodes: {"all":[...]}, {"any":[...]}, {"not": node}.
            Comparison leaf: {"attr":"subject.dept","op":"eq","value":"eng"}.
          additionalProperties: true
        priority:
          type: integer
          description: Higher priority is evaluated first; deny wins at any priority.
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ABACPolicyCreate:
      type: object
      required:
        - name
        - effect
        - resource_type
        - action
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
        resource_type:
          type: string
          description: Resource type to match; '*' matches any resource type.
          minLength: 1
        action:
          type: string
          description: Action to match; '*' matches any action.
          minLength: 1
        condition:
          type: object
          description: Optional condition tree. Omit or send {} for unconditional.
          additionalProperties: true
        priority:
          type: integer
          default: 0
          description: Higher priority policies are evaluated first.
        enabled:
          type: boolean
          default: true
    ABACEvaluateRequest:
      type: object
      required:
        - action
      description: Input for an ABAC policy evaluation. Subject/resource/context carry the attribute bags.
      properties:
        subject:
          type: object
          description: Subject (caller) attributes, e.g. {"id":"user:123","department":"eng"}.
          additionalProperties: true
        resource:
          type: object
          description: Resource attributes.
          properties:
            type:
              type: string
              description: Resource type, e.g. "document".
            id:
              type: string
              description: Resource identifier.
            attrs:
              type: object
              description: Additional resource attributes.
              additionalProperties: true
        action:
          type: string
          description: The action being attempted, e.g. "read".
        context:
          type: object
          description: Request-context attributes, e.g. {"ip":"1.2.3.4","hour":14}.
          additionalProperties: true
    ABACDecision:
      type: object
      description: Result of an ABAC evaluation.
      properties:
        allow:
          type: boolean
          description: True when an allow policy matched and no deny policy matched.
        effect:
          type: string
          enum:
            - allow
            - deny
        matched_policy_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the policy that determined the outcome, if any.
        reason:
          type: string
          description: Human-readable explanation of the decision.
        trace:
          type: array
          description: Grant-path trace (present only when ?explain=true).
          items:
            type: string
