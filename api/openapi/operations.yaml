      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: framework
          in: path
          required: true
          schema:
            type: string
            enum: [soc2, iso27001]
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '201':
          description: Evidence run generated; body contains the full control-by-control report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceRun'
        '400':
          $ref: '#/components/responses/Unprocessable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      operationId: get_v1_tenants_ByTenantID_compliance_ByFramework_evidence
      summary: List compliance evidence runs
      description: >-
        Returns previous evidence runs for the framework, most recent first.
        Controls are omitted; call GET .../compliance/evidence/{id} for the
        full report.
      tags:
        - Compliance
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: framework
          in: path
          required: true
          schema:
            type: string
            enum: [soc2, iso27001]
