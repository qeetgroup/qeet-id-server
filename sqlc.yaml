# sqlc pilot. Schema is a pg_dump snapshot of the migrated DB (regenerate with
# `make sqlc-schema`); queries live in sqlc/queries. Generated code lands in a
# standalone package (platform/sqlcgen) as the proven template — repos
# are migrated onto it incrementally, not all at once.
version: "2"
sql:
  - engine: postgresql
    schema: sqlc/schema.sql
    queries: sqlc/queries
    gen:
      go:
        package: sqlcgen
        out: platform/sqlcgen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
