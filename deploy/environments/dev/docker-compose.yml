# Local dev: Postgres only. App tiers run on the host (make dev).
# Credentials come from ./.env (gitignored); see .env.example.
#
# Project name encodes the environment (qeet-id-dev) so containers/network/volume
# all carry the `qeet-id-dev_` prefix. The prod-shaped stack uses qeet-id-prod
# (see deploy/environments/prod/compose/docker-compose.prod.yml) with the same
# `pgdata` key, so dev and prod never share a volume.
name: qeet-id-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-qeet_id}
      PGPORT: ${POSTGRES_PORT:-5001}
    ports:
      - "${POSTGRES_PORT:-5001}:${POSTGRES_PORT:-5001}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$VAR so the container shell expands it, not compose.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p $${PGPORT}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:   # -> qeet-id-dev_pgdata (project name + key); never collides with prod
