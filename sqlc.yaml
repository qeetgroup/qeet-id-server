# sqlc pilot. Source (schema snapshot + queries) and generated code are
# co-located under platform/database/sqlc. Schema is a pg_dump snapshot of the
# migrated DB (regenerate with `make sqlc-schema`); queries live in
# platform/database/sqlc/queries. Generated code lands alongside them as the
# proven template — repos are migrated onto it incrementally, not all at once.
version: "2"
sql:
  - engine: postgresql
    schema: platform/database/sqlc/schema.sql
    queries: platform/database/sqlc/queries
    gen:
      go:
        package: sqlcgen
        out: platform/database/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
