# Test environment: an ephemeral Postgres for running the suite against a real
# DB on the host (Postman/API tests, manual integration runs). Distinct project
# name + port + database so it never collides with the dev stack (:5001).
#
# Note: `make test-integration` does NOT need this — it spins its own throwaway
# Postgres via testcontainers. Use this when you want a persistent test DB or to
# point `make test-api` at a known instance.
name: qeet-id-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-qeet_id_test}
      PGPORT: ${TEST_POSTGRES_PORT:-5002}
    ports:
      - "${TEST_POSTGRES_PORT:-5002}:${TEST_POSTGRES_PORT:-5002}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p $${PGPORT}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:   # -> qeet-id-test_pgdata; isolated from dev and prod
