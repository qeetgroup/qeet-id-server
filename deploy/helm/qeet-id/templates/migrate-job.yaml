{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "qeet-id.fullname" . }}-migrate
  labels:
    {{- include "qeet-id.labels" . | nindent 4 }}
  annotations:
    # Run to completion BEFORE the Deployment rolls, so the schema is in place
    # and (with expand/contract migrations) compatible with both app versions.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "qeet-id.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ include "qeet-id.migrateImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # migrate/migrate ENTRYPOINT is `migrate`; k8s substitutes $(DB_URL).
          args: ["-path", "/migrations", "-database", "$(DB_URL)", "up"]
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "qeet-id.secretName" . }}
                  key: DB_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
{{- end }}
