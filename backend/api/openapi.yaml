openapi: 3.1.0
info:
  title: qeet-identity
  version: 0.1.0
  description: |
    Identity platform monolith. Endpoints are grouped by bounded context
    (tenant, user, auth, rbac). Per-context OpenAPI specs will replace this
    file once each context grows enough surface to warrant its own document.
servers:
  - url: http://localhost:4001
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: ok
  /v1/auth/signup:
    post:
      summary: Public self-service signup. Takes email + password only; backend auto-creates a personal workspace.
      description: |
        In one atomic transaction:
        1. Generates a personal tenant (`personal-<12hex>` slug, `<name>'s workspace` name).
        2. Creates the user with a password credential.
        3. Creates a system `owner` role for the personal tenant and grants every platform permission to it.
        4. Assigns the user to the owner role.
        5. Issues an access + refresh token pair.

        The user can rename their workspace or create more after sign-in via `POST /v1/tenants`.
        Email is globally unique (migration 0022).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:        { type: string, format: email }
                password:     { type: string, minLength: 8, maxLength: 256 }
                display_name: { type: string, maxLength: 200 }
      responses:
        '201':
          description: created + token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:          { type: object }
                  tenant:        { type: object }
                  access_token:  { type: string }
                  refresh_token: { type: string }
                  token_type:    { type: string, example: Bearer }
                  expires_at:    { type: string, format: date-time }
                  user_id:       { type: string, format: uuid }
                  tenant_id:     { type: string, format: uuid }
                  roles:         { type: array, items: { type: string }, example: [owner] }
        '409': { description: email already in use }
        '422': { description: validation failed }
  /v1/auth/login:
    post:
      summary: Issue an access + refresh token pair. Looks the user up by email globally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: token pair }
        '401': { description: invalid credentials }
  /v1/auth/refresh:
    post:
      summary: Rotate a refresh token. Reuse triggers session revocation.
      responses:
        '200': { description: token pair }
  /v1/tenants:
    get:  { summary: List tenants, responses: { '200': { description: ok }, '401': { description: missing token } } }
    post: { summary: Create tenant, responses: { '201': { description: created } } }
  /v1/users:
    get:  { summary: List users in caller's tenant, responses: { '200': { description: ok } } }
    post: { summary: Create user, responses: { '201': { description: created } } }
  /v1/check:
    get:
      summary: Authorize an action.
      parameters:
        - in: query
          name: user_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: tenant_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: permission
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed: { type: boolean }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
