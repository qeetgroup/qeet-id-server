  /v1/tenants/{tenantID}/abac/evaluate:
    post:
      operationId: post_v1_tenants_ByTenantID_abac_evaluate
      summary: Evaluate ABAC policies
      description: |
        Runs the deny-wins ABAC evaluation algorithm against all enabled policies
        that match the supplied resource type and action. Returns the decision and,
        when ?explain=true, a trace of every policy evaluated.
      tags:
        - ABAC
      parameters:
        - name: tenantID
          in: path
