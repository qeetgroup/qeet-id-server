# Staging overrides. Apply with: helm upgrade --install qeet-id ./deploy/helm/qeet-id \
#   -n qeet-id-staging -f deploy/helm/qeet-id/values-staging.yaml
replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests: { cpu: 50m, memory: 96Mi }
  limits: { cpu: 500m, memory: 256Mi }

ingress:
  hosts:
    - host: id.staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: qeet-id-staging-tls
      hosts:
        - id.staging.example.com

config:
  SERVICE_ENV: "staging"
  APP_BASE_URL: "https://app.staging.example.com"
  LOGIN_BASE_URL: "https://login.staging.example.com"
  ALLOWED_ORIGINS: "https://app.staging.example.com,https://login.staging.example.com"
  CSRF_COOKIE_DOMAIN: ".staging.example.com"
  OTEL_TRACES_SAMPLER_RATIO: "1"
  WEBAUTHN_RP_ID: "staging.example.com"
  WEBAUTHN_RP_ORIGINS: "https://app.staging.example.com,https://login.staging.example.com"
