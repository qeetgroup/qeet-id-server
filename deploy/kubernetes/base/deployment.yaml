apiVersion: apps/v1
kind: Deployment
metadata:
  name: qeet-id
  namespace: qeet-id
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: qeet-id
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qeet-id
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: qeet-id
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: api
          image: ghcr.io/qeetgroup/qeet-id:latest  # override with image.tag in overlay
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: qeet-id-config
            - secretRef:
                name: qeet-id-secrets  # must be provisioned separately
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: qeet-id
