# LOCAL development/testing ONLY — never used for staging/prod (Helm or the prod
# compose without this -f). Relaxes browser-security gates so Postman can drive
# the full auth flow over http://localhost:
#   SERVICE_ENV=dev    -> skips the prod boot gate; cookies are non-Secure
#   CSRF_DISABLED=true -> documented dev/Postman hatch (bearer requests already
#                         bypass CSRF; this unblocks the first Signup/Login POST)
services:
  backend:
    ports:
      - "4000:4000"
    environment:
      SERVICE_ENV: dev
      CSRF_DISABLED: "true"
