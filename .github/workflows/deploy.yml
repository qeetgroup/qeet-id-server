name: deploy

on:
  push:
    tags: ['v*'] # deploy only when YOU publish a release tag (vX.Y.Z)
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.id.qeet.in
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Fast gate: don't ship code that doesn't build/pass unit tests.
      - name: Build & unit test
        run: |
          go build ./...
          go test ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REPO: ${{ vars.ECR_REPOSITORY_URL }}
          VERSION: ${{ github.ref_name }} # the release tag, e.g. v0.2.0
        run: |
          docker build -t "$REPO:$VERSION" -t "$REPO:${{ github.sha }}" -t "$REPO:latest" .
          docker push "$REPO:$VERSION"
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

      - name: Roll the host (SSM)
        env:
          INSTANCE_ID: ${{ vars.INSTANCE_ID }}
        run: |
          cmd_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${{ github.ref_name }}" \
            --parameters commands='["/opt/qeet-id/redeploy.sh"]' \
            --query Command.CommandId --output text)
          echo "SSM command: $cmd_id"
          aws ssm wait command-executed --command-id "$cmd_id" --instance-id "$INSTANCE_ID" || true
          status=$(aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "status: $status"
          [ "$status" = "Success" ]
