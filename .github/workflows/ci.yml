name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      # Scan the working tree (not git history); .gitleaks.toml allowlists test fixtures.
      # Uses the free MIT CLI — the gitleaks-action wrapper requires a paid org license.
      - name: Run gitleaks
        run: gitleaks dir . -c .gitleaks.toml --redact --verbose
