version: "2"
sql:
  - engine: "postgresql"
    schema: "../../platform/database/migrations"
    queries: "queries.sql"
    gen:
      go:
        package: "dbgen"
        out: "dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
