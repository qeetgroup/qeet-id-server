version: 2
updates:
  # ── Go modules ──────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: [dependencies, backend, go]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      go-minor-patch:
        update-types: [minor, patch]
      go-major:
        update-types: [major]
    ignore:
      # Pin major versions of crypto and JWT libs — review manually.
      - dependency-name: "golang.org/x/crypto"
        update-types: [version-update:semver-major]
      - dependency-name: "github.com/golang-jwt/jwt/v5"
        update-types: [version-update:semver-major]

  # ── pnpm workspace (frontend) ───────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: [dependencies, frontend, javascript]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      react-ecosystem:
        patterns: ["react", "react-dom", "react-*", "@types/react*"]
      next-ecosystem:
        patterns: ["next", "next-*", "@next/*", "eslint-config-next"]
      tanstack:
        patterns: ["@tanstack/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "tailwind-merge", "tailwind-variants"]
      lint-format:
        patterns: ["eslint", "eslint-*", "prettier", "prettier-*", "@eslint/*", "typescript-eslint"]
      types:
        patterns: ["@types/*"]
      minor-patch:
        update-types: [minor, patch]

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
      include: scope

  # ── Docker base images ──────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    labels: [dependencies, docker]
    commit-message:
      prefix: "chore(docker)"
      include: scope
