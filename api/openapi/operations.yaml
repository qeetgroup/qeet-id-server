openapi: 3.1.0
info:
  title: Qeet ID — Operations API (audit, billing, analytics)
  version: 0.2.0
  description: 'Qeet ID identity platform — full HTTP surface.


    This document is generated to cover EVERY route mounted by the chi router (internal/http/router.go) and is guarded by internal/http/openapi_coverage_test.go, which fails CI if any mounted route is undocumented. Launch-critical families (Auth, OIDC/OAuth, SCIM, SAML, Users, Tenants, RBAC, API Keys) carry fully-described request/response bodies; remaining admin CRUD routes carry accurate path/method/params/security with summarized bodies (noted in each operation''s description).


    Auth modes: `bearerAuth` (user/service JWT), `apiKeyAuth` (`Authorization: ApiKey <key>`), `scimBearer` (per-tenant SCIM token), `clientCredentials` (OAuth M2M), and `ssoCookie` (hosted-login SSO session).'
servers:
  - url: http://localhost:4001
    description: Local (docker compose)
  - url: http://localhost:4000
    description: Local (make dev-backend)
tags:
  - name: Audit
    description: Append-only, hash-chained audit log query and integrity verification.
  - name: GDPR
    description: Right-to-erasure purge requests.
  - name: Billing
    description: Subscription plans, subscriptions, and invoices.
  - name: Analytics
    description: Per-tenant usage analytics.
  - name: Email Templates
    description: Per-tenant transactional email template overrides.
  - name: Data Retention
    description: Per-tenant auto-purge of soft-deleted users.
  - name: Admin
    description: Operational/admin endpoints (outbox DLQ).
  - name: Health
    description: Liveness, readiness, and Prometheus metrics.
  - name: Rate Limits
    description: Per-tenant rate-limit overrides (tenant / user / API-key buckets).
  - name: Compliance
    description: SOC 2 and ISO 27001 live evidence generation from real tenant system state.
  - name: Copilot
    description: >-
      AI copilot inference service — streaming conversation turns, conversation
      management, and configuration status. Tool execution runs client-side
      under the user's own token (RBAC/RLS/audit inherited). API key is
      server-side only and never returned by any endpoint.
  - name: Search
    description: >-
      Universal tenant-scoped fuzzy search across all resource types. Results
      are RBAC-gated per type — the caller only sees resources their role
      allows them to read.
  - name: Activity
    description: >-
      Live Activity feed — a real-time SSE event stream and cursor-paginated
      history, both sourced from the hash-chained audit log and the NATS outbox.
      Tenant-scoped; requires audit.read. The SSE stream fans out domain events
      from the transactional outbox; reconnects replay missed events via
      Last-Event-ID.
paths:
  /v1/activity:
    get:
      operationId: get_v1_activity
      summary: Activity history
      description: >-
        Returns a cursor-paginated list of ActivityEvent derived from the
        tenant-scoped audit log. Severity and category are computed from the
        event type and applied post-fetch. Tenant is derived from the JWT
        principal only — never from URL or body.
      tags:
        - Activity
      parameters:
        - name: cursor
          in: query
          required: false
          description: >-
            Opaque pagination cursor from a previous response next_cursor field.
            Encodes the ID of the last seen event.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum events to return (1–200; default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: types
          in: query
          required: false
          description: >-
            Comma-separated list of exact event types (audit action values, e.g.
            "user.created,user.deleted"). Omit to return all types.
          schema:
            type: string
            example: 'user.created,user.deleted'
        - name: severity
          in: query
          required: false
          description: >-
            Minimum severity level. Events below this level are excluded.
            Severity is derived from the event type, not stored in the DB.
          schema:
            type: string
            enum: [info, success, warning, error, critical]
        - name: category
          in: query
          required: false
          description: >-
            Filter by event category (authentication, authorization, security,
            directory, developer, system). Derived from the event type prefix.
          schema:
            type: string
            enum:
              - authentication
              - authorization
              - security
              - directory
              - developer
              - system
        - name: actor
          in: query
          required: false
          description: Filter by actor user UUID.
          schema:
            type: string
            format: uuid
        - name: subject
          in: query
          required: false
          description: >-
            Identity timeline filter. When set, returns every event where the
            given user UUID is either the actor OR the target of a 'user'
            resource event. Omit to return events for all subjects.
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          required: false
          description: >-
            Free-text search over action, resource_type, actor_type, user_agent,
            and metadata. Evaluated as a PostgreSQL websearch_to_tsquery
            expression — supports quoted phrases, exclusions (-saml), and OR.
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on event timestamp (RFC3339).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive upper bound on event timestamp (RFC3339).
          schema:
            type: string
            format: date-time
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Paginated activity events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '400':
          $ref: '#/components/responses/Unprocessable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/activity/stream:
    get:
      operationId: get_v1_activity_stream
      summary: Live activity stream (SSE)
      description: >-
        Opens a Server-Sent Events stream of ActivityEvent frames for the
        caller's tenant. Each frame is `event: activity\ndata: <json>\n\n`;
        periodic `: keep-alive` comments prevent proxy timeouts.


        When `Last-Event-ID` is supplied the server replays up to 100 audit
        events newer than that ID (chronological order) before switching to
        the live stream, covering reconnect gaps.


        Server-side filters (`?types`, `?severity`, `?category`) are applied
        to both the replay and the live stream. The connection tenant is
        derived from the JWT principal only — never from the URL or body.


        The write deadline is extended to 1 hour. Set
        `X-Accel-Buffering: no` is already set by the server (Nginx/Caddy
        proxy buffering disabled).
      tags:
        - Activity
      parameters:
        - name: types
          in: query
          required: false
          description: >-
            Comma-separated event type prefixes to match (e.g. "user,auth").
            An event matches if its type equals or starts with any listed value.
          schema:
            type: string
        - name: severity
          in: query
          required: false
          description: Minimum severity level to stream.
          schema:
            type: string
            enum: [info, success, warning, error, critical]
        - name: category
          in: query
          required: false
          description: Exact category to stream; omit for all.
          schema:
            type: string
            enum:
              - authentication
              - authorization
              - security
              - directory
              - developer
              - system
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: >-
            SSE stream of ActivityEvent frames. Event name: "activity".
            Periodic "`: keep-alive`" comments maintain the connection.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/search:
    get:
      operationId: get_v1_search
      summary: Universal search
      description: >-
        Tenant-scoped, RBAC-enforced fuzzy search that fans out across
        user, organization, group, role, oidc_client, and audit_event
        resource types. Each type is gated behind its read permission
        (user.read, tenant.read, group.read, role.read, connection.read,
        audit.read); types the caller cannot read are silently excluded.
        Matching uses ILIKE '%q%' (parameterised). Results are scored and
        returned in descending relevance order. Pagination is cursor-based
        and opaque.
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (1+ characters after trimming).
          schema:
            type: string
        - name: types
          in: query
          required: false
          description: >-
            Comma-separated list of resource types to search.
            Allowed values: user, organization, group, role, oidc_client,
            audit_event. Omit to search all permitted types.
          schema:
            type: string
            example: 'user,group'
        - name: cursor
          in: query
          required: false
          description: Opaque pagination cursor from a previous response's next_cursor field.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum results to return (1–50; default 20).
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/Unprocessable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/tenants/{tenantID}/rate-limits:
    get:
      operationId: get_v1_tenants_ByTenantID_rate_limits
      summary: Get rate limits
      description: >-
        Returns the effective per-bucket limits (tenant, user, api_key) — the
        platform defaults merged with any tenant-specific overrides.
      tags:
        - Rate Limits
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Effective limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantRateLimits'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      operationId: put_v1_tenants_ByTenantID_rate_limits
      summary: Set rate limits
      tags:
        - Rate Limits
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRateLimits'
      responses:
        '200':
          description: Updated effective limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantRateLimits'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      operationId: delete_v1_tenants_ByTenantID_rate_limits
      summary: Reset rate limits
      tags:
        - Rate Limits
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '204':
          description: Overrides cleared
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /healthz:
    get:
      operationId: get_healthz
      summary: Liveness
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /metrics:
    get:
      operationId: get_metrics
      summary: Metrics (Prometheus)
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /readyz:
    get:
      operationId: get_readyz
      summary: Readiness
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '503':
          description: Not ready (a dependency is down)
  /v1/admin/outbox/dlq:
    get:
      operationId: get_v1_admin_outbox_dlq
      summary: List DLQ events
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/tenants/{tenantID}/billing/checkout:
    post:
      operationId: post_v1_tenants_ByTenantID_billing_checkout
      summary: Start checkout
      description: >-
        Returns a hosted-payment URL to redirect the admin to, or {status:"active"} when the plan is free or no card provider serves the request (direct activation). The provider is chosen by billing country (config-driven; an omitted country falls back to currency-based routing: INR → Razorpay, else the default provider). The provider's webhook later activates the subscription.
      tags:
        - Billing
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - plan_code
                - currency
                - success_url
                - cancel_url
              properties:
                plan_code:
                  type: string
                currency:
                  type: string
                country:
                  type: string
                  description: ISO-3166-1 alpha-2 billing country; selects the payment provider. Omitted → currency-based routing.
                success_url:
                  type: string
                  format: uri
                cancel_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Either a checkout URL ({status:"checkout"}) or {status:"active"}
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /v1/billing/webhooks/{provider}:
    post:
      operationId: post_v1_billing_webhooks_ByProvider
      summary: Payment webhook
      description: >-
        Receives provider payment events. Authenticated by the provider's webhook signature (no user session); on a verified successful payment the referenced checkout is completed idempotently.
      tags:
        - Billing
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [stripe, razorpay]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event acknowledged
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/billing/plans:
    get:
      operationId: get_v1_billing_plans
      summary: List plans
      tags:
        - Billing
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/gdpr/purge:
    post:
      operationId: post_v1_gdpr_purge
      summary: Create purge request
      tags:
        - GDPR
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        description: Request body summarized; see the handler for exact fields.
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/gdpr/purge/{id}:
    delete:
      operationId: delete_v1_gdpr_purge_ById
      summary: Cancel purge request
      tags:
        - GDPR
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/tenants/{tenantID}/analytics/overview:
    get:
      operationId: get_v1_tenants_ByTenantID_analytics_overview
      summary: Tenant analytics overview
      tags:
        - Analytics
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/tenants/{tenantID}/audit:
    get:
      operationId: get_v1_tenants_ByTenantID_audit
      summary: List audit events
      tags:
        - Audit
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: >
            Free-text search over action, resource_type, actor_type, user_agent,
            and metadata. Evaluated as a PostgreSQL websearch_to_tsquery expression —
            supports quoted phrases ("failed login"), exclusions (-saml), and OR.
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
        - name: actor_user_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          required: false
          description: The id of the last-seen event, for keyset pagination.
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: '{ items: AuditEvent[], next_cursor: string }'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /v1/audit/verify:
    get:
      operationId: get_v1_audit_verify
      summary: Verify platform audit chain (public)
      description: >-
        Verifies the platform-level audit hash chain (the rows with no tenant)
        and returns only whether the chain is intact and how many rows were
        checked. Unauthenticated by design so any external party can
        independently confirm the platform has not tampered with its audit log;
        per-tenant verification is at /v1/tenants/{tenantID}/audit/verify and
        requires auth.
      tags:
        - Audit
      security: []
      responses:
        '200':
          description: '{ chain_valid: bool, rows_checked: int }'
          content:
            application/json:
              schema:
                type: object
                properties:
                  chain_valid:
                    type: boolean
                  rows_checked:
                    type: integer
                required:
                  - chain_valid
                  - rows_checked
  /v1/tenants/{tenantID}/audit/verify:
    get:
      operationId: get_v1_tenants_ByTenantID_audit_verify
      summary: Verify audit chain
      description: Walks the tenant's hash chain from the seed and recomputes each row's hash, returning the first broken link (if any). No side effects.
      tags:
        - Audit
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: '{ ok: bool, rows_checked: int, last_verified_id?: uuid, broken_at_id?: uuid, broken_reason?: string }'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/tenants/{tenantID}/audit/anomalies:
    get:
      operationId: get_v1_tenants_ByTenantID_audit_anomalies
      summary: List audit anomalies
      description: Flagged deviations from a behavioral baseline built per (tenant, actor) over audit.events — a first-time action type, an unusual hour, or a new IP. Scored by a background sweep, not synchronously on write.
      tags:
        - Audit
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, resolved]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Anomalies
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditAnomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/tenants/{tenantID}/audit/anomalies/summary:
    get:
      operationId: get_v1_tenants_ByTenantID_audit_anomalies_summary
      summary: Audit anomaly summary
      tags:
        - Audit
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: '{ open: int, resolved_7d: int, high_score_open: int }'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/tenants/{tenantID}/audit/anomalies/{id}/resolve:
    post:
      operationId: post_v1_tenants_ByTenantID_audit_anomalies_ById_resolve
      summary: Resolve an audit anomaly
      tags:
        - Audit
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
