name: qeet-id-dev

# Local dev: Postgres only. The app runs on the host via `make dev`.
# Start: make db-up   Stop: make db-down

services:
  postgres:
    image: postgres:16-alpine
    # Fixed local-dev credentials. These must match DB_URL in .env
    # (default: postgres://postgres:password@localhost:5001/qeet_id).
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qeet_id
      PGPORT: 5001
    ports:
      - "5001:5001"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qeet_id -p 5001"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
