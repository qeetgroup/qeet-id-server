apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qeet-id-staging

resources:
  - ../../../base/kubernetes/base

patches:
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: qeet-id
  - path: patch-config.yaml
    target:
      kind: ConfigMap
      name: qeet-id-config

images:
  - name: ghcr.io/qeetgroup/qeet-id
    newTag: latest  # override with --set images[0].newTag=v1.2.3
  - name: ghcr.io/qeetgroup/qeet-id-migrate
    newTag: latest
