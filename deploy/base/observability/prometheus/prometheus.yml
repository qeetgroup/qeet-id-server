# Standalone Prometheus scrape config for the Compose stack. In Kubernetes the
# Helm chart ships a ServiceMonitor (serviceMonitor.enabled) instead, and the
# Prometheus Operator discovers the target — this file is for compose/dev.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: qeet-id
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: qeet-id
