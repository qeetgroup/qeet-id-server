# Production-shaped Compose stack (staging target).
#
# Topology: Caddy (TLS + reverse proxy) -> backend (:4000) ; Postgres + Redis as
# backing stores ; a one-shot `migrate` service applies schema before the app
# starts. The Helm chart in ../helm is the eventual production target — this
# stack gives a hardened single-host deploy in the meantime.
#
# Usage:
#   cp .env.prod.example .env.prod        # fill in non-secret config
#   export JWT_SECRET="$(openssl rand -base64 48)"
#   export JWT_SIGNING_KEY="$(cat signing-key.pem)"     # EC P-256 PEM (multiline)
#   export SECRETS_KEY="$(openssl rand -base64 32)"     # or use SECRETS_PROVIDER=aws-kms
#   export SAML_IDP_KEY="$(cat saml-idp.key)" SAML_IDP_CERT="$(cat saml-idp.crt)"
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Secrets are interpolated from the shell environment (so multiline PEMs survive);
# non-secret config lives in .env.prod (env_file). Never commit real secrets.

# Project name encodes the environment so volumes/containers/network carry the
# `qeet-id-prod_` prefix (volumes: qeet-id-prod_pgdata / _redisdata / …). The dev
# stack uses qeet-id-dev with the same `pgdata` key — they never share a volume.
name: qeet-id-prod

x-images:
  # Override with pushed, digest-pinned tags in real deploys.
  backend: &backend_image ${QEETID_IMAGE:-qeet-id:local}
  migrate: &migrate_image ${QEETID_MIGRATE_IMAGE:-qeet-id-migrate:local}

# DB connection string, assembled here from POSTGRES_* (the password comes from
# the shell env). Defined once via a YAML anchor and shared by the migrate
# one-shot and the backend — env_file values are NOT interpolated by Compose, so
# the password must be injected through interpolation here, not in .env.prod.
x-db-url: &db_url postgres://${POSTGRES_USER:-qeet}:${POSTGRES_PASSWORD:?set via shell env}@postgres:5432/${POSTGRES_DB:-qeet_id}?sslmode=disable

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env.prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set via shell env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory-policy", "noeviction"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  # One-shot: applies migrations, then exits 0. The backend waits on its success.
  migrate:
    image: *migrate_image
    build:
      context: ../../../..
      dockerfile: deploy/base/docker/Dockerfile.migrate
    command: ["-database", *db_url, "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [internal]

  backend:
    image: *backend_image
    build:
      context: ../../../..
      dockerfile: deploy/base/docker/Dockerfile
      args:
        VERSION: ${QEETID_VERSION:-dev}
        COMMIT: ${QEETID_COMMIT:-none}
        BUILD_DATE: ${QEETID_BUILD_DATE:-unknown}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      # DB_URL assembled via interpolation (env_file values aren't interpolated,
      # so the shell-provided password must be injected here). Overrides env_file.
      DB_URL: *db_url
      # Secrets — interpolated from the shell (kept out of .env.prod / git).
      JWT_SECRET: ${JWT_SECRET:?set via shell env}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?EC P-256 PEM; set via shell env}
      JWT_RETIRED_KEYS: ${JWT_RETIRED_KEYS:-}
      SECRETS_KEY: ${SECRETS_KEY:-}
      SECRETS_WRAPPED_DEK: ${SECRETS_WRAPPED_DEK:-}
      SAML_IDP_KEY: ${SAML_IDP_KEY:?RSA PEM; set via shell env}
      SAML_IDP_CERT: ${SAML_IDP_CERT:?X.509 PEM; set via shell env}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # No container HEALTHCHECK: the distroless image has no shell/curl. Caddy
    # health-checks the upstream at /healthz; k8s/Helm uses /healthz + /readyz.
    expose:
      - "4000"
    networks: [internal, edge]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    environment:
      QEETID_DOMAIN: ${QEETID_DOMAIN:?public hostname, e.g. api.id.qeet.in}
    networks: [edge]

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:

networks:
  # `internal` has no egress to the proxy tier; only Caddy is on `edge`.
  internal:
    internal: true
  edge:
