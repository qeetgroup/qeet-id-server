          type: string
        idp_sso_url:
          type: string
          format: uri
        idp_certificate:
          type: string
        email_attribute:
          type: string
        name_attribute:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
