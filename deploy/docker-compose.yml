# Runs on the EC2 host at /opt/qeet-id. The CI/CD pipeline copies this file +
# Caddyfile here, then runs `docker compose up -d`.
#
# The qeet-id server is the whole backend: it embeds the background workers and
# auto-applies DB migrations on startup, so a single container is enough.
# Caddy fronts it with automatic HTTPS (Let's Encrypt) for api.id.qeet.in.
#
# `.env` (next to this file, host-only, never committed) provides IMAGE,
# SITE_ADDRESS, DB_URL and all app config/secrets. The multi-line JWT_SIGNING_KEY
# is exported into the shell by the deploy step (env files can't hold newlines).

services:
  app:
    image: ${IMAGE:-ghcr.io/qeetgroup/qeet-id:latest}
    restart: always
    env_file:
      - .env
    environment:
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
    expose:
      - "4001"
    ports:
      - "127.0.0.1:4001:4001" # loopback only (health checks); never exposed publicly
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on: [app]
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
