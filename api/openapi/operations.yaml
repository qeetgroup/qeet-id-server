  /v1/tenants/{tenantID}/compliance/{framework}/evidence:
    post:
      operationId: post_v1_tenants_ByTenantID_compliance_ByFramework_evidence
      summary: Generate compliance evidence
      description: >-
        Runs all controls for the framework against live tenant state (MFA
        policy, audit log, RBAC, retention, SIEM config, secrets vault, etc.),
        persists an immutable evidence run, and returns the full per-control
        report. framework must be 'soc2' or 'iso27001'.
