          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        entity_id:
          type: string
        acs_url:
          type: string
          format: uri
        name_id_format:
          type: string
        name_id_attribute:
          type: string
        certificate:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
    SAMLServiceProviderCreate:
      type: object
      required:
      - name
      - entity_id
