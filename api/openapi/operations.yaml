        '201':
          description: Evidence run generated; body contains the full control-by-control report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceRun'
        '400':
          $ref: '#/components/responses/Unprocessable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      operationId: get_v1_tenants_ByTenantID_compliance_ByFramework_evidence
      summary: List compliance evidence runs
      description: >-
        Returns previous evidence runs for the framework, most recent first.
        Controls are omitted; call GET .../compliance/evidence/{id} for the
        full report.
      tags:
        - Compliance
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: framework
          in: path
          required: true
          schema:
            type: string
            enum: [soc2, iso27001]
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: List of evidence runs (controls omitted).
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/EvidenceRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/tenants/{tenantID}/compliance/evidence/{id}:
    get:
      operationId: get_v1_tenants_ByTenantID_compliance_evidence_ById
      summary: Get compliance evidence run (full report)
      description: >-
        Returns the full evidence run including per-control results. Carries a
        Content-Disposition header so browsers treat it as a downloadable JSON
        evidence report. tenant-scoped; 404 when the run belongs to a different tenant.
      tags:
        - Compliance
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Full evidence run with per-control results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/copilot/status:
    get:
      operationId: get_v1_copilot_status
      summary: Copilot configuration status
      description: >-
        Returns whether the AI copilot is configured server-side and which
        provider/model is active. Never returns key material. Used by the
        console to render the unconfigured setup state.
      tags:
        - Copilot
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Copilot status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/copilot/conversations:
    get:
      operationId: get_v1_copilot_conversations
      summary: List conversations
      description: >-
        Returns all copilot conversations for the authenticated user within
        their tenant, ordered by pinned-first then most-recently-updated.
      tags:
        - Copilot
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CopilotConversation'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: post_v1_copilot_conversations
      summary: Create conversation
      description: Creates a new copilot conversation thread for the authenticated user.
      tags:
        - Copilot
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Optional title; defaults to "New conversation".
      responses:
        '201':
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotConversation'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/copilot/conversations/{conversationID}:
    get:
      operationId: get_v1_copilot_conversations_ByConversationID
      summary: Get conversation with messages
      description: >-
        Returns a single conversation and its full message history in
        chronological order.
      tags:
        - Copilot
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Conversation with messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/CopilotConversation'
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/CopilotMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patch_v1_copilot_conversations_ByConversationID
      summary: Update conversation
      description: Rename or pin/unpin a conversation.
      tags:
        - Copilot
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                pinned:
                  type: boolean
      responses:
        '200':
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotConversation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: delete_v1_copilot_conversations_ByConversationID
      summary: Delete conversation
      description: Deletes a conversation and all its messages.
      tags:
        - Copilot
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/copilot/conversations/{conversationID}/messages:
    post:
      operationId: post_v1_copilot_conversations_ByConversationID_messages
      summary: Send a message / continue with tool results (SSE stream)
      description: >-
        Opens a streaming turn of the AI copilot conversation.
        The response is a `text/event-stream` of SSE frames (thinking, token,
        tool_call, tool_result, error, done). Each frame is
        `event: <type>\ndata: <json>\n\n`.


        On `stop_reason=tool_use` the stream ends with `done{reason:"tool_use"}`;
        the browser executes the tool under its own bearer token and posts
        `tool_results` to this same endpoint to continue generation.


        Requires `COPILOT_PROVIDER` configured server-side; returns
        `409 copilot_unconfigured` otherwise.
      tags:
        - Copilot
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: User text input for this turn (mutually exclusive with tool_results).
                tool_results:
                  type: array
                  description: >-
                    Tool execution results from the previous turn (continuation
                    after client-side tool execution). Mutually exclusive with
                    message.
                  items:
                    type: object
                    properties:
                      tool_call_id:
                        type: string
                      name:
                        type: string
                      output:
                        type: object
                        additionalProperties: true
                      error:
                        type: object
                        properties:
                          code:
                            type: string
                          message:
                            type: string
                context:
                  type: object
                  description: >-
                    Console context for grounding (current route, selection).
                    Treated as untrusted; never used for authorization.
                  additionalProperties: true
      responses:
        '200':
          description: >-
            SSE stream of StreamEvent frames. Event types: thinking, token,
            tool_call, tool_result, error, done.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Copilot not configured (COPILOT_PROVIDER/COPILOT_API_KEY unset)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'User or service JWT: `Authorization: Bearer <token>`.'
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'API key credential. Send `Authorization: ApiKey <key>` (note the `ApiKey ` prefix). Accepted on the same authenticated routes as bearerAuth.'
    scimBearer:
      type: http
      scheme: bearer
      description: 'Per-tenant SCIM provisioning token presented by the IdP: `Authorization: Bearer <scim-token>`. Distinct from user JWTs; rotated via the SCIM admin endpoints.'
    clientCredentials:
      type: oauth2
      description: OAuth 2.0 client credentials. Clients authenticate at the token endpoint via form params (`client_id`/`client_secret`) or HTTP Basic. Revocation/introspection use the same client auth.
      flows:
        clientCredentials:
          tokenUrl: /v1/oauth/token
          scopes: {}
    ssoCookie:
      type: apiKey
      in: cookie
      name: qe_ls
      description: Hosted-login SSO session cookie (HttpOnly). Set by POST /v1/auth/session and consumed by the OAuth authorize/consent flow.
  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessable:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    ActivityActor:
      type: object
      description: The principal that caused an activity event.
      properties:
        id:
          type: string
          format: uuid
          description: Actor user UUID (absent for system/agent actors).
        name:
          type: string
          description: Display name when resolvable; omitted otherwise.
        type:
          type: string
          description: Actor type (e.g. "user", "system", "agent").
      required: [type]
    ActivityTarget:
      type: object
      description: The resource the event acted upon.
      properties:
        type:
          type: string
          description: Resource type (e.g. "user", "group", "tenant").
        id:
          type: string
          format: uuid
          description: Resource UUID (omitted for un-keyed resources).
        label:
          type: string
          description: Human-readable resource label when available.
      required: [type]
    ActivityEvent:
      type: object
      description: >-
        Unified representation of a domain event, derived from either the live
        NATS outbox stream or the durable audit log. Category and severity are
        computed from the event type and are never stored in the DB.
      required: [id, type, category, severity, title, at]
      properties:
        id:
          type: string
          format: uuid
          description: >-
            For audit-log events this is the stable audit.events row UUID and
            is safe to use as Last-Event-ID for reconnect replay. For live NATS
            events a fresh UUID is generated per delivery.
        type:
          type: string
          description: >-
            Audit action string (e.g. "user.created", "auth.login.failed").
            Dot-namespaced; first segment is the resource type.
          example: user.created
        category:
          type: string
          description: >-
            Coarse operational category derived from the event type prefix.
          enum:
            - authentication
            - authorization
            - security
            - directory
            - developer
            - system
        severity:
          type: string
          description: >-
            Derived severity level.
            critical — security incident (token reuse, threat detection);
            warning — failure or destructive operation;
            success — positive transition (create, enable, login);
            info — everything else.
          enum: [info, success, warning, error, critical]
        title:
          type: string
          description: Human-readable title derived from the event type.
          example: 'User Created'
        description:
          type: string
          description: Optional extended description.
        actor:
          $ref: '#/components/schemas/ActivityActor'
        target:
          $ref: '#/components/schemas/ActivityTarget'
        at:
          type: string
          format: date-time
          description: Event timestamp (UTC, RFC3339).
        source:
          type: string
          description: Event source identifier (e.g. service name).
        ip:
          type: string
          description: Requester IP address (dot-decimal or IPv6).
        location:
          type: string
          description: Best-effort geo location derived from IP (optional).
        device:
          type: string
          description: Device label parsed from user-agent (optional).
        browser:
          type: string
          description: Browser label parsed from user-agent (optional).
        status:
          type: string
          description: Application-level status carried in the event (optional).
        metadata:
          type: object
          additionalProperties: true
          description: Domain-specific supplementary fields (non-normative).
    ActivityResponse:
      type: object
      description: Paginated activity history response.
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ActivityEvent'
        next_cursor:
          type: string
          description: >-
            Opaque cursor for the next page. Present only when more results
            exist; omitted when this is the last page.
    SearchResult:
      type: object
      description: One item returned by the universal search endpoint.
      required: [type, id, title, subtitle, url, status, updated_at, score, metadata]
      properties:
        type:
          type: string
          description: Resource type.
          enum: [user, organization, group, role, oidc_client, audit_event]
        id:
          type: string
          format: uuid
        title:
          type: string
          description: Human-readable primary label (e.g. display name or resource name).
        subtitle:
          type: string
          description: Secondary label (e.g. email or slug).
        url:
          type: string
          description: Console deep-link for this resource.
        status:
          type: string
          description: Resource lifecycle status (e.g. "active", "suspended", "recorded").
        updated_at:
          type: string
          format: date-time
          description: Last-updated timestamp (uses created_at for immutable resources).
        score:
          type: number
          format: float
          description: >-
            Relevance score in [0.5, 1.0]: 1.0 = exact match, 0.75 = prefix
            match, 0.5 = substring match. Results are sorted desc by score.
        metadata:
          type: object
          description: Type-specific supplementary fields (non-normative).
          additionalProperties: true
    SearchResponse:
      type: object
      description: Paginated search result envelope.
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        next_cursor:
          type: string
          description: >-
            Opaque cursor for the next page. Present only when more results
            exist; omitted (not null) when this is the last page.
    CopilotStatus:
      type: object
      description: AI copilot configuration state. Never contains key material.
      properties:
        configured:
          type: boolean
          description: True when COPILOT_PROVIDER and COPILOT_API_KEY are set.
        provider:
          type: string
          description: Provider name (e.g. "anthropic"); empty when not configured.
        model:
          type: string
          description: Model identifier (e.g. "claude-sonnet-5"); empty when not configured.
    CopilotConversation:
      type: object
      description: A named copilot conversation thread (tenant + user scoped).
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
        pinned:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CopilotMessage:
      type: object
      description: >-
        One turn in a copilot conversation. `content` is an array of Anthropic
        content blocks (text / tool_use / tool_result) stored verbatim.
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, tool]
        content:
          type: array
          description: Anthropic content-block array.
          items:
            type: object
            additionalProperties: true
        created_at:
          type: string
          format: date-time
    AuditAnomaly:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
          nullable: true
        actor_email:
          type: string
          nullable: true
        score:
          type: number
          description: 0..1 weighted-novelty anomaly score.
        reasons:
          type: array
          items:
            type: string
            enum: [new_action_type, unusual_hour, new_ip]
        status:
          type: string
          enum: [open, resolved]
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        action:
          type: string
        resource_type:
          type: string
        ip:
          type: string
          nullable: true
        event_at:
          type: string
          format: date-time
    AuditAnomalySettings:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        enabled:
          type: boolean
        score_threshold:
          type: number
          description: 0..1; an event scoring at or above this is flagged.
        min_baseline_events:
          type: integer
          description: Cold-start guard — an actor needs this many historical events before anything is flagged for them.
    RateLimitBucket:
      type: object
      description: A single token-bucket limit (rate tokens/sec, burst capacity).
      properties:
        rate:
          type: number
          description: Sustained tokens per second.
        capacity:
          type: integer
          description: Maximum burst capacity.
    TenantRateLimits:
      type: object
      description: >-
        Per-bucket rate limits for a tenant. On GET these are the effective
        values (defaults merged with overrides); on PUT, any bucket supplied is
        upserted as an override.
      properties:
        tenant:
          $ref: '#/components/schemas/RateLimitBucket'
        user:
          $ref: '#/components/schemas/RateLimitBucket'
        api_key:
          $ref: '#/components/schemas/RateLimitBucket'
    EvidenceControlResult:
      type: object
      description: Outcome of a single compliance control check against live system state.
      properties:
        id:
          type: string
          description: Unique control identifier within the framework (e.g. CC6.1-MFA).
        name:
          type: string
        category:
          type: string
        criteria:
          type: string
          description: Framework reference code (e.g. CC6.1 or A.9.4).
        status:
          type: string
          enum: [pass, fail, na]
          description: >-
            pass — condition positively confirmed; fail — condition not met;
            na — data not determinable (never a fabricated pass).
        detail:
          type: string
          description: Human-readable explanation of what was found; always populated.
    EvidenceRun:
      type: object
      description: >-
        Immutable snapshot of one compliance evidence generation pass for a
        tenant+framework pair. Controls are populated on GetRun; omitted on
        ListRuns.
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        framework:
          type: string
          enum: [soc2, iso27001]
        generated_at:
          type: string
          format: date-time
        generated_by:
          type: string
          format: uuid
          nullable: true
          description: Actor user ID; null when generated by a system or API-key actor.
        pass_count:
          type: integer
        fail_count:
          type: integer
        na_count:
          type: integer
        controls:
          type: array
          description: Per-control results; present on GetRun, omitted on ListRuns.
          items:
            $ref: '#/components/schemas/EvidenceControlResult'
    Error:
      type: object
      required:
        - error
      description: Canonical error envelope (internal/platform/httpx.WriteError).
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Stable machine code
              example: unauthorized
            message:
              type: string
              example: authentication required
            detail:
              type: string
              description: Optional human detail
            request_id:
              type: string
              description: Correlates with the X-Request-Id header
