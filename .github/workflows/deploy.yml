name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the SHA that CI tested, not whatever is latest on main
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -o qeet-id-server ./cmd/server

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          HOST_KEY: ${{ secrets.EC2_HOST_KEY }}
        run: |
          # Add known host key to prevent MITM — store your EC2 host key in EC2_HOST_KEY secret
          # Get it once with: ssh-keyscan -H <your-ec2-host>
          mkdir -p ~/.ssh
          echo "$HOST_KEY" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          # Write SSH key to a temp file, guaranteed cleanup on exit
          KEY_FILE=$(mktemp)
          trap "rm -f $KEY_FILE" EXIT
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 400 "$KEY_FILE"

          # Copy binary to staging location
          scp -i "$KEY_FILE" qeet-id-server "$USER@$HOST:/home/ubuntu/qeet-id-server"

          # Swap binary, restart, and auto-rollback if service fails to come up
          ssh -i "$KEY_FILE" "$USER@$HOST" << 'ENDSSH'
            set -e

            # Back up the running binary before replacing it
            sudo cp /opt/qeet-id/qeet-id-server /opt/qeet-id/qeet-id-server.bak 2>/dev/null || true

            sudo mv /home/ubuntu/qeet-id-server /opt/qeet-id/qeet-id-server
            sudo chmod +x /opt/qeet-id/qeet-id-server
            sudo systemctl restart qeet-id
            sleep 5

            if ! sudo systemctl is-active --quiet qeet-id; then
              echo "Service failed to start — rolling back to previous binary"
              sudo cp /opt/qeet-id/qeet-id-server.bak /opt/qeet-id/qeet-id-server
              sudo systemctl restart qeet-id
              sudo systemctl status qeet-id --no-pager
              exit 1
            fi

            sudo systemctl status qeet-id --no-pager
          ENDSSH
