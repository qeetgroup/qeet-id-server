# Local dev: Postgres only. App tiers run on the host (make dev).
# Credentials come from backend/.env (gitignored); see .env.example.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in backend/.env}
      POSTGRES_DB: ${POSTGRES_DB:-qeet_id}
      PGPORT: ${POSTGRES_PORT:-5001}
    ports:
      - "${POSTGRES_PORT:-5001}:${POSTGRES_PORT:-5001}"
    volumes:
      - qeet-id_pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$VAR so the container shell expands it, not compose.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p $${PGPORT}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qeet-id_pgdata:
    name: qeet-id_pgdata   # exact name, no "backend_" project prefix
