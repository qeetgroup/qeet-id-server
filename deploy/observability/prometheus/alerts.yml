# Alert rules for qeet-id. Compatible with standalone Prometheus (rule_files)
# and the Prometheus Operator (paste the groups into a PrometheusRule CR).
# Metric names match internal/platform/metrics: http_requests_total{method,route,
# status}, http_request_duration_seconds_* and the standard go_/process_ series.
groups:
  - name: qeet-id.availability
    rules:
      - alert: QeetIdTargetDown
        expr: up{job="qeet-id"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "qeet-id target down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for 2m."

      - alert: QeetIdNoMetrics
        expr: absent(up{job="qeet-id"})
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "qeet-id has no scrape target"
          description: "No qeet-id target is being scraped — check service discovery."

  - name: qeet-id.errors
    rules:
      - alert: QeetIdHighErrorRate
        # >5% of requests returning 5xx over 5m (ignoring /metrics, /healthz).
        expr: |
          sum(rate(http_requests_total{job="qeet-id",status=~"5..",route!~"/metrics|/healthz|/readyz"}[5m]))
            /
          sum(rate(http_requests_total{job="qeet-id",route!~"/metrics|/healthz|/readyz"}[5m]))
            > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "qeet-id 5xx error rate >5%"
          description: "5xx ratio is {{ $value | humanizePercentage }} over the last 5m."

  - name: qeet-id.latency
    rules:
      - alert: QeetIdHighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="qeet-id"}[5m])) by (le)
          ) > 1
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "qeet-id p99 latency >1s"
          description: "p99 request latency is {{ $value }}s over the last 5m."

  - name: qeet-id.runtime
    rules:
      - alert: QeetIdRestarting
        # Requires kube-state-metrics in Kubernetes.
        expr: increase(kube_pod_container_status_restarts_total{container="qeet-id"}[15m]) > 2
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "qeet-id pod restarting"
          description: "{{ $labels.pod }} restarted >2 times in 15m."

      - alert: QeetIdHighGoroutines
        expr: go_goroutines{job="qeet-id"} > 5000
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "qeet-id goroutine count high"
          description: "{{ $value }} goroutines — possible leak (e.g. unbounded outbound calls)."
