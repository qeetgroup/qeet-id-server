# golangci-lint configuration.
#
# Starts from golangci-lint's default linter set (made explicit for
# reproducibility between local `make lint` and CI) plus two low-false-positive
# additions (misspell, unconvert).
#
# The commented linters below are the ratchet path: enable them one at a time
# after triaging their findings. `gosec` is especially valuable for an identity
# platform — turn it on once the initial findings are reviewed.
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    # --- golangci-lint defaults ---
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # --- safe additions (low false-positive) ---
    - misspell
    - unconvert
    # --- ratchet path (enable + triage one at a time) ---
    # - gosec        # security analyzer — high value for an identity platform
    # - bodyclose    # unclosed HTTP response bodies
    # - revive       # style, with a curated rule set
    # - gocritic     # opinionated correctness/style checks
    # - errorlint    # error-wrapping correctness

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files may legitimately ignore some errors (e.g. defer resp.Body.Close()).
    - path: _test\.go
      linters:
        - errcheck
