openapi: 3.1.0
info:
  title: Qeet ID API
  version: 0.2.0
  description: 'Qeet ID identity platform — full HTTP surface.


    This document is generated to cover EVERY route mounted by the chi router (internal/http/router.go)
    and is guarded by internal/http/openapi_coverage_test.go, which fails CI if any mounted route is undocumented.
    Launch-critical families (Auth, OIDC/OAuth, SCIM, SAML, Users, Tenants, RBAC, API Keys) carry fully-described
    request/response bodies; remaining admin CRUD routes carry accurate path/method/params/security with
    summarized bodies (noted in each operation''s description).


    Auth modes: `bearerAuth` (user/service JWT), `apiKeyAuth` (`Authorization: ApiKey <key>`), `scimBearer`
    (per-tenant SCIM token), `clientCredentials` (OAuth M2M), and `ssoCookie` (hosted-login SSO session).'
servers:
- url: http://localhost:4001
  description: Local (docker compose)
- url: http://localhost:4000
  description: Local (make dev-backend)
tags:
- name: Auth
  description: Login, signup, refresh, sessions, hosted-login SSO cookie.
- name: OIDC
  description: 'OpenID Connect / OAuth 2.0 provider: discovery, authorize, token, userinfo, clients, grants,
    revocation, introspection, RP-initiated logout, and machine-to-machine service principals.'
- name: SAML
  description: SAML 2.0 SSO — Qeet as Service Provider (consuming external IdPs) and as Identity Provider
    (serving downstream SPs).
- name: SCIM
  description: SCIM 2.0 user/group provisioning (per-tenant bearer token presented by the IdP) plus tenant-admin
    token management.
- name: Users
  description: User CRUD, password set, and soft-delete recycle bin (restore/purge).
- name: Tenants
  description: Tenant (workspace) CRUD.
- name: RBAC
  description: Roles, permissions, assignments, and authorization checks.
- name: MFA
  description: TOTP and OTP (email/SMS) second factors plus recovery codes.
- name: Passkeys
  description: WebAuthn passkey registration and passwordless login.
- name: Social
  description: Social/OAuth identity-provider login and account linking.
- name: API Keys
  description: Long-lived API keys for machine access.
- name: Webhooks
  description: Outbound webhook endpoint management.
- name: Audit
  description: Append-only, hash-chained audit log query and integrity verification.
- name: GDPR
  description: Right-to-erasure purge requests.
- name: Secrets
  description: Per-tenant encrypted secrets vault.
- name: LDAP
  description: LDAP / Active Directory connection management and bind authentication.
- name: IP Rules
  description: Per-tenant IP allow/deny CIDR rules.
- name: Billing
  description: Subscription plans, subscriptions, and invoices.
- name: Analytics
  description: Per-tenant usage analytics.
- name: Invites
  description: Tenant member invitations.
- name: Groups
  description: User groups and membership.
- name: Verification
  description: Email and phone verification flows.
- name: Branding
  description: Per-tenant hosted-login branding.
- name: Email Templates
  description: Per-tenant transactional email template overrides.
- name: Auth Policy
  description: Per-tenant password rules and allowed login methods.
- name: Data Retention
  description: Per-tenant auto-purge of soft-deleted users.
- name: Policy
  description: Per-tenant security policy.
- name: Admin
  description: Operational/admin endpoints (outbox DLQ).
- name: Health
  description: Liveness, readiness, and Prometheus metrics.
paths:
  /.well-known/jwks.json:
    get:
      operationId: get_wellKnown_jwks_json
      summary: JSON Web Key Set for verifying issued tokens
      tags:
      - OIDC
      security: []
      responses:
        '200':
          description: JWK Set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'
  /.well-known/openid-configuration:
    get:
      operationId: get_wellKnown_openid_configuration
      summary: OIDC discovery document
      tags:
      - OIDC
      security: []
      responses:
        '200':
          description: Discovery metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCDiscovery'
  /healthz:
    get:
      operationId: get_healthz
      summary: Get healthz
      tags:
      - Health
      security: []
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /ldap/{id}/authenticate:
    post:
      operationId: post_ldap_ById_authenticate
      summary: Authenticate an end user against an LDAP/AD connection (bind)
      tags:
      - LDAP
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security: []
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404': &id003
          $ref: '#/components/responses/NotFound'
        '422': &id005
          $ref: '#/components/responses/Unprocessable'
        '429': &id006
          $ref: '#/components/responses/TooManyRequests'
  /metrics:
    get:
      operationId: get_metrics
      summary: Get metrics
      tags:
      - Health
      security: []
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /oauth/introspect:
    post:
      operationId: post_oauth_introspect
      summary: RFC 7662 token introspection (client-authenticated)
      tags:
      - OIDC
      security:
      - clientCredentials: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
      responses:
        '200':
          description: Introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Introspection'
        '400': &id001
          $ref: '#/components/responses/BadRequest'
        '401': &id002
          $ref: '#/components/responses/Unauthorized'
  /oauth/revoke:
    post:
      operationId: post_oauth_revoke
      summary: RFC 7009 token revocation (client-authenticated)
      tags:
      - OIDC
      security:
      - clientCredentials: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum:
                  - access_token
                  - refresh_token
      responses:
        '200':
          description: 'Revoked (RFC 7009: always 200 even for unknown tokens)'
        '400': *id001
        '401': *id002
  /readyz:
    get:
      operationId: get_readyz
      summary: Get readyz
      tags:
      - Health
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '503':
          description: Not ready (a dependency is down)
  /saml/acs/{id}:
    post:
      operationId: post_saml_acs_ById
      summary: Assertion Consumer Service (CSRF-exempt; signature-validated)
      tags:
      - SAML
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse:
                  type: string
                RelayState:
                  type: string
      responses:
        '302':
          description: Signature-validated; redirect with a one-time login code
        '400': *id001
        '401': *id002
  /saml/exchange:
    post:
      operationId: post_saml_exchange
      summary: Exchange a one-time SAML login code for a token pair
      tags:
      - SAML
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400': *id001
        '401': *id002
  /saml/idp/metadata:
    get:
      operationId: get_saml_idp_metadata
      summary: IdP metadata XML (Qeet as IdP)
      tags:
      - SAML
      security: []
      responses:
        '200':
          description: IdP metadata XML
          content:
            application/xml:
              schema:
                type: string
  /saml/idp/sso:
    get:
      operationId: get_saml_idp_sso
      summary: IdP SingleSignOnService (HTTP-Redirect binding)
      tags:
      - SAML
      parameters:
      - in: query
        name: SAMLRequest
        schema:
          type: string
      - in: query
        name: RelayState
        schema:
          type: string
      security: []
      responses:
        '200':
          description: Auto-submit POST form back to the SP ACS with a signed SAMLResponse
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to hosted login when no SSO session
        '400': *id001
    post:
      operationId: post_saml_idp_sso
      summary: IdP SingleSignOnService (HTTP-POST binding; CSRF-exempt)
      tags:
      - SAML
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLRequest:
                  type: string
                RelayState:
                  type: string
      responses:
        '200':
          description: Auto-submit POST form back to the SP ACS with a signed SAMLResponse
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to hosted login when no SSO session
        '400': *id001
  /saml/login/{id}:
    get:
      operationId: get_saml_login_ById
      summary: SP-initiated login redirect to the external IdP
      tags:
      - SAML
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security: []
      responses:
        '302':
          description: Redirect to the external IdP with an AuthnRequest
        '404': *id003
  /saml/metadata/{id}:
    get:
      operationId: get_saml_metadata_ById
      summary: SP metadata XML for a SAML connection (Qeet as SP)
      tags:
      - SAML
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security: []
      responses:
        '200':
          description: SP metadata XML
          content:
            application/xml:
              schema:
                type: string
        '404': *id003
  /scim/v2/Groups:
    get:
      operationId: get_scim_v2_Groups
      summary: List/filter SCIM groups
      tags:
      - SCIM
      parameters:
      - in: query
        name: filter
        schema:
          type: string
      - in: query
        name: startIndex
        schema:
          type: integer
      - in: query
        name: count
        schema:
          type: integer
      security:
      - scimBearer: []
      responses:
        '200':
          description: ListResponse
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMListResponse'
        '400': *id001
        '401': *id002
    post:
      operationId: post_scim_v2_Groups
      summary: Create a SCIM group
      tags:
      - SCIM
      security:
      - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/SCIMGroup'
      responses:
        '201':
          description: Group created
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMGroup'
        '400': *id001
        '401': *id002
        '409': &id004
          $ref: '#/components/responses/Conflict'
  /scim/v2/Groups/{id}:
    delete:
      operationId: delete_scim_v2_Groups_ById
      summary: Delete a SCIM group
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      responses:
        '204':
          description: Deleted
        '401': *id002
        '404': *id003
    get:
      operationId: get_scim_v2_Groups_ById
      summary: Get a SCIM group
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      responses:
        '200':
          description: Group
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMGroup'
        '401': *id002
        '404': *id003
    patch:
      operationId: patch_scim_v2_Groups_ById
      summary: Patch a SCIM group (PatchOp; member add/remove)
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/SCIMPatchOp'
      responses:
        '200':
          description: Patched
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMGroup'
        '400': *id001
        '401': *id002
        '404': *id003
    put:
      operationId: put_scim_v2_Groups_ById
      summary: Replace a SCIM group
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/SCIMGroup'
      responses:
        '200':
          description: Replaced
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMGroup'
        '400': *id001
        '401': *id002
        '404': *id003
  /scim/v2/ResourceTypes:
    get:
      operationId: get_scim_v2_ResourceTypes
      summary: SCIM ResourceTypes
      tags:
      - SCIM
      security:
      - scimBearer: []
      responses:
        '200':
          description: SCIM metadata
          content:
            application/scim+json:
              schema:
                type: object
                additionalProperties: true
        '401': *id002
  /scim/v2/Schemas:
    get:
      operationId: get_scim_v2_Schemas
      summary: SCIM Schemas
      tags:
      - SCIM
      security:
      - scimBearer: []
      responses:
        '200':
          description: SCIM metadata
          content:
            application/scim+json:
              schema:
                type: object
                additionalProperties: true
        '401': *id002
  /scim/v2/ServiceProviderConfig:
    get:
      operationId: get_scim_v2_ServiceProviderConfig
      summary: SCIM ServiceProviderConfig
      tags:
      - SCIM
      security:
      - scimBearer: []
      responses:
        '200':
          description: SCIM metadata
          content:
            application/scim+json:
              schema:
                type: object
                additionalProperties: true
        '401': *id002
  /scim/v2/Users:
    get:
      operationId: get_scim_v2_Users
      summary: List/filter SCIM users
      tags:
      - SCIM
      parameters:
      - in: query
        name: filter
        schema:
          type: string
        description: SCIM filter, e.g. userName eq "a@b.com"
      - in: query
        name: startIndex
        schema:
          type: integer
          minimum: 1
      - in: query
        name: count
        schema:
          type: integer
          minimum: 0
      security:
      - scimBearer: []
      responses:
        '200':
          description: ListResponse
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMListResponse'
        '400': *id001
        '401': *id002
    post:
      operationId: post_scim_v2_Users
      summary: Provision a SCIM user
      tags:
      - SCIM
      security:
      - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/SCIMUser'
          application/json:
            schema:
              $ref: '#/components/schemas/SCIMUser'
      responses:
        '201':
          description: User provisioned
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMUser'
        '400': *id001
        '401': *id002
        '409': *id004
  /scim/v2/Users/{id}:
    delete:
      operationId: delete_scim_v2_Users_ById
      summary: Delete (deprovision) a SCIM user
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      responses:
        '204':
          description: Deprovisioned
        '401': *id002
        '404': *id003
    get:
      operationId: get_scim_v2_Users_ById
      summary: Get a SCIM user
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      responses:
        '200':
          description: User
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMUser'
        '401': *id002
        '404': *id003
    patch:
      operationId: patch_scim_v2_Users_ById
      summary: Patch a SCIM user (PatchOp; e.g. deprovision via active=false)
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/SCIMPatchOp'
      responses:
        '200':
          description: Patched
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMUser'
        '400': *id001
        '401': *id002
        '404': *id003
    put:
      operationId: put_scim_v2_Users_ById
      summary: Replace a SCIM user
      tags:
      - SCIM
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/SCIMUser'
      responses:
        '200':
          description: Replaced
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/SCIMUser'
        '400': *id001
        '401': *id002
        '404': *id003
  /v1/admin/outbox/dlq:
    get:
      operationId: get_v1_admin_outbox_dlq
      summary: Get dlq
      tags:
      - Admin
      security:
      - bearerAuth: []
      - apiKeyAuth: []
      description: Response body summarized; accurate path/method/params/security. Enrich the body later.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': *id002
        '403': &id007
          $ref: '#/components/responses/Forbidden'
        '404': *id003
        '422': *id005
        '429': *id006
  /v1/api-keys:
    post:
      operationId: post_v1_api_keys
      summary: Create an API key (secret shown once)
      tags:
      - API Keys
      security:
      - bearerAuth: []
      - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
      responses:
        '201':
          description: Created; secret shown once
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    $ref: '#/components/schemas/ApiKey'
                  secret:
                    type: string
                  warning:
                    type: string
        '400': *id001
        '401': *id002
        '403': *id007
        '422': *id005
  /v1/api-keys/{id}:
    delete:
      operationId: delete_v1_api_keys_ById
      summary: Revoke an API key
      tags:
      - API Keys
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      - apiKeyAuth: []
      responses:
        '204':
          description: Revoked
        '401': *id002
        '403': *id007
        '404': *id003
  /v1/auth/forgot-password:
    post:
      operationId: post_v1_auth_forgot_password
      summary: Start a password-reset flow (enumeration-safe)
      tags:
      - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Accepted (always, to avoid account enumeration); returns a neutral confirmation message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422': *id005
        '429': *id006
  /v1/auth/login:
    post:
      operationId: post_v1_auth_login
      summary: Password login; issue an access + refresh token pair
      tags:
      - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401': *id002
        '422': *id005
        '429': *id006
  /v1/auth/logout:
    post:
      operationId: post_v1_auth_logout
      summary: Revoke the caller's current session
      tags:
      - Auth
      security:
      - bearerAuth: []
      - apiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        description: Request body summarized; see the handler for exact fields.
      responses:
        '200':
          description: Signed out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401': *id002
  /v1/auth/magic-link/consume:
    post:
      operationId: post_v1_auth_magic_link_consume
      summary: Consume a magic-link token and issue a token pair
      tags:
      - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400': *id001
        '401': *id002
        '422': *id005
  /v1/auth/magic-link/start:
    post:
      operationId: post_v1_auth_magic_link_start
      summary: Send a passwordless magic-link email
      tags:
      - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Accepted (always, to avoid account enumeration); returns a neutral confirmation message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422': *id005
        '429': *id006
  /v1/auth/me:
    get:
      operationId: get_v1_auth_me
      summary: Return the authenticated principal (user/tenant/session/scopes)
      tags:
      - Auth
      security:
      - bearerAuth: []
