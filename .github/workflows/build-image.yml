name: Build image

# Builds the qeet-id server image from source and pushes it to GHCR.
# Deployment lives in a separate repo (qeet-deploy/qeet-id-deploy) which pulls
# this image — see that repo's deploy.yml. (Split out of the old combined deploy.yml.)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ghcr.io/${{ github.repository }} # qeetgroup/qeet-id-server (lowercase)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: notify the deploy repo to roll out this image (needs a PAT with
      # 'repo' scope in secrets.DEPLOY_DISPATCH_TOKEN). Left disabled by default.
      # - name: Trigger deploy
      #   run: |
      #     curl -sf -X POST \
      #       -H "Authorization: Bearer ${{ secrets.DEPLOY_DISPATCH_TOKEN }}" \
      #       -H "Accept: application/vnd.github+json" \
      #       https://api.github.com/repos/qeetgroup/qeet-id-deploy/dispatches \
      #       -d '{"event_type":"qeet-id-server-image","client_payload":{"image_tag":"${{ github.sha }}"}}'
