{{- if .Values.migrate.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "qeet-id.fullname" . }}-migrate
  labels:
    {{- include "qeet-id.labels" . | nindent 4 }}
  annotations:
    # Run before the app rolls out, on install and upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  # Reaped automatically after success (also covered by hook-delete-policy).
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "qeet-id.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "qeet-id.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "qeet-id.migrateImage" . | quote }}
          imagePullPolicy: {{ .Values.migrate.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # Path is baked into the image; $(DB_URL) expands from env below.
          args: ["-database", "$(DB_URL)", "up"]
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "qeet-id.secretName" . }}
                  key: DB_URL
{{- end }}
