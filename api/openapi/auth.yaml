        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ABACEvaluateRequest'
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ABACDecision'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
