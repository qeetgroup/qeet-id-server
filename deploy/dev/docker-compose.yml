name: qeet-id-dev

# Local dev: Postgres only. The app runs on the host via `make dev`.
# Start: make db-up   Stop: make db-down

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-qeet_id}
      PGPORT: ${POSTGRES_PORT:-5001}
    ports:
      - "${POSTGRES_PORT:-5001}:${POSTGRES_PORT:-5001}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p $${PGPORT}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
