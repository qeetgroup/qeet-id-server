      properties:
        name:
          type: string
        entity_id:
          type: string
        acs_url:
          type: string
          format: uri
        name_id_format:
          type: string
        name_id_attribute:
          type: string
        certificate:
          type: string
    SCIMUser:
      type: object
      required:
      - schemas
      properties:
